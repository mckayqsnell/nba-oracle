name: Build and Push Image

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nba-oracle-api

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compute image refs and start time
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_OWNER}/${{ env.IMAGE_NAME }}"
          SHA_TAG="prod-${{ github.sha }}"
          {
            echo "image=${IMAGE}"
            echo "sha_tag=${SHA_TAG}"
            echo "image_sha=${IMAGE}:${SHA_TAG}"
            echo "image_latest=${IMAGE}:latest"
            echo "build_start=$(date +%s)"
          } >> "$GITHUB_OUTPUT"
          echo "📦 Image: ${IMAGE}"
          echo "🏷️  SHA tag: ${SHA_TAG}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # docker/build-push-action does not push when the build fails — a failed
      # build cannot publish a broken :latest tag (default behavior).
      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_latest }}
            ${{ steps.meta.outputs.image_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Verify image is present at GHCR
        run: |
          IMAGE_REF="${{ steps.meta.outputs.image_sha }}"
          echo "🔎 Inspecting ${IMAGE_REF}..."
          if ! docker buildx imagetools inspect "${IMAGE_REF}" >/dev/null 2>&1; then
            echo "❌ Image not found at ${IMAGE_REF} after push."
            echo "   build-push-action reported success but the registry does not have it."
            exit 1
          fi
          echo "✅ Image present at GHCR"

      - name: Build summary
        if: always()
        env:
          COMMIT_SUBJECT_RAW: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR_RAW: ${{ github.event.head_commit.author.name }}
        run: |
          # Fall back to git log when not triggered by push (e.g. workflow_dispatch)
          COMMIT_SUBJECT="${COMMIT_SUBJECT_RAW:-$(git log -1 --format=%s 2>/dev/null || echo '(unknown)')}"
          COMMIT_AUTHOR="${COMMIT_AUTHOR_RAW:-$(git log -1 --format='%an' 2>/dev/null || echo '(unknown)')}"
          # First line only — multi-line commit messages would break the summary
          COMMIT_SUBJECT=$(echo "$COMMIT_SUBJECT" | head -1)

          BUILD_START="${{ steps.meta.outputs.build_start }}"
          NOW=$(date +%s)
          if [ -n "$BUILD_START" ]; then
            DURATION="$((NOW - BUILD_START))s"
          else
            DURATION="?"
          fi

          {
            echo "## 🏗️ Build Summary"
            echo ""
            echo "- **Status**: \`${{ job.status }}\`"
            echo "- **Image (SHA)**: \`${{ steps.meta.outputs.image_sha }}\`"
            echo "- **Image (latest)**: \`${{ steps.meta.outputs.image_latest }}\`"
            echo "- **Digest**: \`${{ steps.build.outputs.digest || 'n/a' }}\`"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Author**: ${COMMIT_AUTHOR}"
            echo "- **Message**: ${COMMIT_SUBJECT}"
            echo "- **Duration**: ${DURATION}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ job.status }}" != "success" ]; then
            {
              echo ""
              echo "### ❌ Failure"
              echo "- [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
