version: '3'

# Secrets Management Tasks
#
# Pushes secrets from 1Password (via your locally-authenticated `op` CLI)
# to the Mac Mini production server. The mini never needs `op` access —
# this MacBook is the source of truth.
#
# Flow:
#   1. Generate fresh .env.prod via op CLI (uses tasks/env.yml)
#   2. SCP it to the mini at ~/projects/nba-oracle/
#   3. SSH to mini and force-recreate the affected containers
#
# Requires:
#   - 1Password CLI (`op`) signed in on this MacBook
#   - SSH alias `mini` configured in ~/.ssh/config (Tailscale hostname)
#   - The remote project dir to already exist (~/projects/nba-oracle/)

vars:
  REMOTE_HOST: '{{.MINI_HOST | default "mini"}}'
  REMOTE_PROJECT_DIR: '{{.MINI_PROJECT_DIR | default "~/projects/nba-oracle"}}'
  COMPOSE_FILE: docker-compose.prod.yml
  # Services that depend on .env.prod and should be recreated on rotation.
  # Add more here if you add services that read these secrets.
  SECRETS_SERVICES: backend cloudflared

tasks:
  # === Public Tasks ===

  push:
    desc: "Generate prod secrets locally and push to the Mac Mini, then restart containers"
    silent: true
    cmds:
      - task: _preflight
      - task: _generate
      - task: _scp
      - task: _restart
      - task: _verify
      - |
        echo ""
        echo "✅ Secrets rotation complete"
        echo "   Image was NOT rebuilt — only containers restarted"
        echo "   Live at: https://api.nbaoracle.com/health"

  push:dry-run:
    desc: "Preview what `secrets:push` would do without making changes"
    silent: true
    cmds:
      - |
        echo "DRY RUN — would do the following:"
        echo "  1. Run: task env:generate ENV=prod  (creates ./.env.prod locally)"
        echo "  2. Run: scp ./.env.prod {{.REMOTE_HOST}}:{{.REMOTE_PROJECT_DIR}}/.env.prod"
        echo "  3. Run: ssh {{.REMOTE_HOST}} 'cd {{.REMOTE_PROJECT_DIR}} && \\"
        echo "         docker compose -f {{.COMPOSE_FILE}} up -d --force-recreate {{.SECRETS_SERVICES}}'"
        echo "  4. Verify health endpoint via cloudflared tunnel"
        echo ""
        echo "Affected services: {{.SECRETS_SERVICES}}"
        echo "Remote host:       {{.REMOTE_HOST}}"
        echo "Remote project:    {{.REMOTE_PROJECT_DIR}}"

  push:status:
    desc: "Show the running container status on the Mac Mini"
    silent: true
    cmds:
      - task: _preflight
      - |
        ssh {{.REMOTE_HOST}} 'cd {{.REMOTE_PROJECT_DIR}} && \
          docker compose -f {{.COMPOSE_FILE}} ps'

  # === Private Tasks ===

  _preflight:
    silent: true
    internal: true
    cmds:
      - |
        # Verify SSH alias works before anything else
        if ! ssh -o ConnectTimeout=5 -o BatchMode=yes {{.REMOTE_HOST}} 'echo ok' >/dev/null 2>&1; then
          echo "❌ Cannot reach SSH host '{{.REMOTE_HOST}}'"
          echo ""
          echo "Check:"
          echo "  - Tailscale running on this Mac and the mini"
          echo "  - SSH alias 'mini' in ~/.ssh/config points to the mini's tailnet name"
          echo "  - You can manually run:  ssh {{.REMOTE_HOST}}"
          exit 1
        fi
      - |
        # Verify remote project dir exists
        if ! ssh {{.REMOTE_HOST}} "test -d {{.REMOTE_PROJECT_DIR}}" 2>/dev/null; then
          echo "❌ Remote dir does not exist: {{.REMOTE_HOST}}:{{.REMOTE_PROJECT_DIR}}"
          echo "   Create it on the mini, or set MINI_PROJECT_DIR=<path>"
          exit 1
        fi
      - |
        # Verify op CLI is signed in
        if ! op account list >/dev/null 2>&1; then
          echo "❌ 1Password CLI not signed in. Run: eval \"\$(op signin)\""
          exit 1
        fi

  _generate:
    silent: true
    internal: true
    cmds:
      - echo "📥 Generating .env.prod from 1Password..."
      - task: env:generate
        vars:
          ENV: prod
      - |
        if [ ! -f .env.prod ]; then
          echo "❌ env:generate did not produce .env.prod"
          exit 1
        fi
        VAR_COUNT=$(grep -cE '^[A-Z_][A-Z0-9_]*=' .env.prod || echo 0)
        if [ "$VAR_COUNT" -lt 1 ]; then
          echo "❌ .env.prod has no variables — refusing to push"
          exit 1
        fi
        echo "   ✓ .env.prod has $VAR_COUNT variables"

  _scp:
    silent: true
    internal: true
    cmds:
      - echo "📤 Pushing .env.prod to {{.REMOTE_HOST}}..."
      - |
        if ! scp -q .env.prod {{.REMOTE_HOST}}:{{.REMOTE_PROJECT_DIR}}/.env.prod; then
          echo "❌ SCP failed"
          exit 1
        fi
      - |
        # Lock down permissions on the remote file (chmod 600)
        ssh {{.REMOTE_HOST}} "chmod 600 {{.REMOTE_PROJECT_DIR}}/.env.prod"
        echo "   ✓ File copied and chmod 600"

  _restart:
    silent: true
    internal: true
    cmds:
      - echo "🔄 Recreating containers ({{.SECRETS_SERVICES}})..."
      - |
        ssh {{.REMOTE_HOST}} "cd {{.REMOTE_PROJECT_DIR}} && \
          docker compose -f {{.COMPOSE_FILE}} up -d --force-recreate {{.SECRETS_SERVICES}}" || {
          echo "❌ Container recreation failed — secrets file may not have applied"
          exit 1
        }
      - echo "   ✓ Containers recreated"

  _verify:
    silent: true
    internal: true
    cmds:
      - echo "🩺 Waiting for backend to become healthy..."
      - |
        # Try health endpoint a few times — give container time to come up
        MAX=10
        for i in $(seq 1 $MAX); do
          if curl -sfm 5 https://api.nbaoracle.com/health >/dev/null 2>&1; then
            echo "   ✓ /health responding (attempt $i)"
            exit 0
          fi
          sleep 3
        done
        echo "⚠️  Backend not responding to /health after $MAX attempts"
        echo "   The push completed, but verify manually:"
        echo "   ssh {{.REMOTE_HOST}} 'cd {{.REMOTE_PROJECT_DIR}} && docker compose logs --tail=50 backend'"
        exit 1
