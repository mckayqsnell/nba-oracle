version: '3'

# 1Password env file generation.
#
# Convention:
#   - Vaults: NBA-Oracle-LOCAL, NBA-Oracle-PROD
#   - One 1Password item per env var (title = VAR_NAME, password = value)
#   - Items tagged `backend` and/or `frontend`
#   - Backend env files:  .env.local, .env.prod
#   - Frontend env files: frontend/.env.local, frontend/.env.prod

tasks:
  generate:
    desc: "Generate .env files from 1Password (no args = all four). Use ENV=local|prod TARGET=backend|frontend to scope."
    deps: [_check_op]
    vars:
      ENV: '{{.ENV | default ""}}'
      TARGET: '{{.TARGET | default ""}}'
    cmds:
      - |
        ENVS="local prod"
        TARGETS="backend frontend"
        [ -n "{{.ENV}}" ] && ENVS="{{.ENV}}"
        [ -n "{{.TARGET}}" ] && TARGETS="{{.TARGET}}"
        for env in $ENVS; do
          for target in $TARGETS; do
            ./scripts/generate-env.sh "$env" "$target"
          done
        done

  setup:
    desc: "Install 1Password CLI deps and pin which account to use"
    cmds:
      - ./scripts/setup-1password.sh

  status:
    desc: "Show 1Password vault and .env file status"
    deps: [_check_op]
    silent: true
    cmds:
      - |
        if [ -f .1password.yml ]; then
          ACCOUNT=$(grep '^account:' .1password.yml | awk '{print $2}' | head -1)
          export OP_ACCOUNT="$ACCOUNT"
          echo "1Password account: $ACCOUNT"
        else
          echo ".1password.yml missing — run: task env:setup"
          exit 1
        fi
        echo ""
        echo "Vaults:"
        for vault in NBA-Oracle-LOCAL NBA-Oracle-PROD; do
          if op vault get "$vault" >/dev/null 2>&1; then
            COUNT_BE=$(op item list --vault="$vault" --tags=backend --format json 2>/dev/null | jq 'length')
            COUNT_FE=$(op item list --vault="$vault" --tags=frontend --format json 2>/dev/null | jq 'length')
            echo "  $vault  (backend: $COUNT_BE, frontend: $COUNT_FE)"
          else
            echo "  $vault  (missing)"
          fi
        done
        echo ""
        echo "Local .env files:"
        for f in .env.local .env.prod frontend/.env.local frontend/.env.prod; do
          if [ -f "$f" ]; then
            CNT=$(grep -cE '^[A-Z_][A-Z0-9_]*=' "$f" || echo 0)
            echo "  $f  ($CNT vars)"
          else
            echo "  $f  (missing)"
          fi
        done

  clean:
    desc: "Remove all generated .env files"
    prompt: "Remove .env.local, .env.prod, frontend/.env.local, frontend/.env.prod?"
    cmds:
      - rm -f .env .env.local .env.prod frontend/.env.local frontend/.env.prod
      - echo "Cleaned"

  _check_op:
    silent: true
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: |
          1Password CLI not installed. Run: task env:setup
      - sh: command -v jq >/dev/null 2>&1
        msg: |
          jq not installed. Run: brew install jq
      - sh: op account list >/dev/null 2>&1
        msg: |
          Not signed in to 1Password. Run: op signin
