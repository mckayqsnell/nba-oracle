services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: nba-oracle-cloudflared
    command: tunnel --no-autoupdate run
    env_file:
      - .env.prod   # TUNNEL_TOKEN comes from here
    restart: unless-stopped
    networks:
      - app
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/mckay-snell/nba-oracle-api:latest
    container_name: nba-oracle-backend
    env_file:
      - .env.prod
    environment:
      - API_ENV=production
      - DEBUG=false
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app:
    driver: bridge
